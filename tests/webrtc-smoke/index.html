<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charivo WebRTC Smoke Harness</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 24px 48px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0 0 20px;
        color: #94a3b8;
      }

      .panel {
        border: 1px solid #334155;
        border-radius: 16px;
        background: #111827;
        padding: 20px;
        margin-bottom: 16px;
      }

      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        background: #38bdf8;
        color: #082f49;
        cursor: pointer;
        font-weight: 700;
      }

      button[disabled] {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input {
        flex: 1 1 360px;
        min-width: 0;
        border-radius: 12px;
        border: 1px solid #475569;
        background: #020617;
        color: #e2e8f0;
        padding: 10px 12px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.55;
      }

      .label {
        display: inline-block;
        min-width: 140px;
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Charivo Realtime WebRTC Smoke Harness</h1>
      <p>
        Package-level browser harness for the realtime chain. This page is test
        infrastructure, not product UI.
      </p>

      <section class="panel">
        <div class="row">
          <button id="connect-button" data-testid="connect-button">
            Start Realtime Session
          </button>
          <button id="disconnect-button" data-testid="disconnect-button">
            Stop Session
          </button>
        </div>
      </section>

      <section class="panel">
        <div class="row">
          <input
            id="message-input"
            data-testid="message-input"
            value="Please smile briefly and then answer in one short sentence."
          />
          <button id="send-button" data-testid="send-button">Send</button>
        </div>
      </section>

      <section class="panel">
        <div>
          <span class="label">Session:</span
          ><span id="session-status" data-testid="session-status">idle</span>
        </div>
        <div>
          <span class="label">Assistant:</span
          ><span id="assistant-status" data-testid="assistant-status"
            >idle</span
          >
        </div>
        <div>
          <span class="label">Last Error:</span
          ><span id="last-error" data-testid="last-error">-</span>
        </div>
      </section>

      <section class="panel">
        <pre id="assistant-text" data-testid="assistant-text"></pre>
      </section>

      <section class="panel">
        <pre id="event-log" data-testid="event-log"></pre>
      </section>
    </main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
